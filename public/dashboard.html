<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squares Dashboard</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#121212">
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --primary-text: #e3e3e3;
            --input-bg: #2d2d2d;
            --border-color: #444;
            --radius-lg: 16px;
            --shadow: 0 4px 12px rgba(0,0,0,0.4);
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0; padding: 30px 15px 80px;
            background: var(--bg-color); color: var(--primary-text); text-align: center;
        }
        h1 { font-weight: 800; letter-spacing: -0.5px; color: #fff; margin-bottom: 5px; }
        .sub { color: #888; margin-bottom: 25px; }
        h3 { margin-top: 0; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; color: #fff; }

        .panel-box {
            background: var(--surface-color); padding: 24px;
            border-radius: var(--radius-lg); margin: 0 auto 20px;
            max-width: 560px; box-shadow: var(--shadow);
            border: 1px solid var(--border-color); text-align: left;
        }
        .row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .label { min-width: 90px; font-weight: bold; color: #aaa; font-size: 0.9rem; }
        input {
            background: var(--input-bg); border: 1px solid var(--border-color);
            color: white; padding: 9px 12px; border-radius: 8px; font-size: 0.9rem; flex: 1; min-width: 0;
        }
        input:focus { outline: 2px solid #008CFF; border-color: transparent; }
        input.color-picker { flex: 0 0 42px; height: 36px; padding: 0; border: none; border-radius: 6px; }
        input.cost-in { flex: 0 0 70px; text-align: center; }
        select { background: var(--input-bg); border: 1px solid var(--border-color); color: #fff; padding: 9px 10px; border-radius: 8px; font-size: 0.9rem; }

        button {
            padding: 9px 18px; cursor: pointer; background: #008CFF; color: white;
            border: none; border-radius: 50px; font-weight: 700; font-size: 0.85rem;
            transition: opacity 0.2s, transform 0.1s; margin: 3px;
        }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button.ghost { background: #333; }
        button.red { background: #ff6b6b; color: #1a0000; }
        button.small { padding: 6px 12px; font-size: 0.8rem; }

        .warn { background: rgba(251,191,36,0.12); border: 1px solid #fbbf24; color: #fbbf24; padding: 12px; border-radius: 10px; font-size: 0.85rem; margin-bottom: 15px; }
        .err { color: #ff6b6b; font-size: 0.85rem; min-height: 1.1em; }
        .muted { color: #666; font-size: 0.85rem; }

        .board-card { background: #252525; border: 1px solid #333; border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; text-align: left; }
        .board-card .top { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; flex-wrap: wrap; }
        .board-card .name { font-weight: 700; color: #fff; font-size: 1.05rem; }
        .board-card .meta { color: #888; font-size: 0.8rem; }
        .board-card .actions { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 4px; }
        .topbar { max-width: 560px; margin: 0 auto 18px; display: flex; justify-content: flex-end; }

        /* CREATE WIZARD */
        .wiz-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 3000; display: flex; align-items: center; justify-content: center; padding: 16px; }
        .wiz-card { background: var(--surface-color); border: 1px solid var(--border-color); border-radius: var(--radius-lg); box-shadow: 0 10px 40px rgba(0,0,0,0.6); width: 100%; max-width: 460px; padding: 22px; text-align: left; max-height: 92vh; overflow-y: auto; }
        .wiz-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
        .wiz-dots { display: flex; gap: 6px; }
        .wiz-dot { width: 8px; height: 8px; border-radius: 50%; background: #444; }
        .wiz-dot.on { background: #008CFF; }
        .wiz-dot.done { background: #4ade80; }
        .wiz-x { background: none; border: none; color: #888; font-size: 1.5rem; cursor: pointer; padding: 0 4px; margin: 0; line-height: 1; }
        .wiz-x:hover { transform: none; opacity: 1; color: #fff; }
        .wiz-title { font-size: 1.3rem; font-weight: 800; color: #fff; margin-bottom: 14px; }
        .wiz-body label { display: block; font-size: 0.82rem; color: #aaa; margin: 12px 0 4px; }
        .wiz-body input[type=text], .wiz-body input[type=number], .wiz-body input:not(.color-picker), .wiz-body select { width: 100%; box-sizing: border-box; margin: 0; }
        .wiz-hint { font-size: 0.78rem; color: #777; margin-top: 4px; }
        .wiz-nav { display: flex; justify-content: space-between; margin-top: 20px; }
        .wiz-err { color: #ff6b6b; font-size: 0.82rem; min-height: 1em; margin-top: 8px; }
        .wiz-choice { border: 1px solid var(--border-color); background: #262626; border-radius: 12px; padding: 14px; margin-top: 10px; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
        .wiz-choice:hover { background: #2d2d2d; }
        .wiz-choice.sel { border-color: #008CFF; background: rgba(0,140,255,0.12); }
        .wiz-choice .ct { font-weight: 700; color: #fff; font-size: 0.98rem; }
        .wiz-choice .cd { color: #999; font-size: 0.82rem; margin-top: 3px; }
        .wiz-team-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
        .wiz-team-row input[type=text] { flex: 1; min-width: 0; }
        .wiz-team-row input.color-picker { flex: 0 0 38px; height: 34px; padding: 0; border: none; border-radius: 6px; }
        .wiz-glist { max-height: 200px; overflow-y: auto; margin-top: 8px; }
        .wiz-grow { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid #2a2a2a; }
        .wiz-links { background: #252525; border: 1px solid #333; border-radius: 10px; padding: 12px; margin-top: 6px; word-break: break-all; font-size: 0.82rem; }
        .wiz-color-pair { display: flex; gap: 16px; margin-top: 8px; flex-wrap: wrap; }
        .wiz-cpair { display: flex; align-items: center; gap: 6px; }
        .wiz-cpair input.color-picker { flex: 0 0 38px; height: 34px; padding: 0; border: none; border-radius: 6px; }
        .wiz-hex { text-transform: uppercase; font-family: monospace; font-size: 0.82rem; }
    </style>
</head>
<body>
    <h1>🏈🏀 Squares</h1>
    <div class="sub">Owner dashboard</div>

    <!-- SET UP (first boot) -->
    <div class="panel-box" id="setup-view" style="display:none;">
        <h3>Set your owner password</h3>
        <p class="muted" style="margin-top:0;">This is the first run. Pick a password to manage every board on this server. Keep it safe, it's how you get back in.</p>
        <div class="row"><span class="label">Password</span><input id="setup-pass" type="password" placeholder="At least 4 characters"></div>
        <div class="row"><span class="label">Confirm</span><input id="setup-pass2" type="password" placeholder="Repeat it" onkeyup="if(event.key==='Enter') doSetup()"></div>
        <div class="err" id="setup-err"></div>
        <div style="text-align:right;"><button onclick="doSetup()">Set password →</button></div>
    </div>

    <!-- LOGIN -->
    <div class="panel-box" id="login-view" style="display:none; max-width:340px;">
        <h3>Owner login</h3>
        <div class="row"><span class="label">Password</span><input id="login-pass" type="password" placeholder="Owner password" onkeyup="if(event.key==='Enter') doLogin()"></div>
        <div class="err" id="login-err"></div>
        <div style="text-align:right;"><button onclick="doLogin()">Log in →</button></div>
    </div>

    <!-- DASHBOARD -->
    <div id="dash-view" style="display:none;">
        <div class="topbar"><button class="ghost small" onclick="doLogout()">Log out</button></div>

        <div class="panel-box">
            <h3 style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
                <span>All boards (<span id="count">0</span>)</span>
                <button onclick="openWizard()">+ New board</button>
            </h3>
            <div id="boards"></div>
        </div>
    </div>

    <!-- CREATE WIZARD -->
    <div id="wiz" class="wiz-overlay" style="display:none;" onclick="if(event.target===this) closeWizard()">
        <div class="wiz-card">
            <div class="wiz-top">
                <div class="wiz-dots" id="wiz-dots"></div>
                <button class="wiz-x" onclick="closeWizard()" aria-label="Close">&times;</button>
            </div>
            <div class="wiz-title" id="wiz-title"></div>
            <div id="wiz-body"></div>
            <div class="wiz-err" id="wiz-err"></div>
            <div class="wiz-nav">
                <button class="ghost" id="wiz-back" onclick="wizBack()">Back</button>
                <button id="wiz-next" onclick="wizNext()">Next →</button>
            </div>
        </div>
    </div>

    <div id="qr-modal" onclick="if(event.target===this) closeQR()" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:3000; align-items:center; justify-content:center; padding:20px;">
        <div style="background:#1e1e1e; border:1px solid #444; border-radius:16px; padding:20px; text-align:center;">
            <div id="qr-title" style="color:#fff; font-weight:700; margin-bottom:10px; word-break:break-word; max-width:260px;"></div>
            <img id="qr-img" alt="QR code for the board link" style="width:240px; height:240px; background:#fff; border-radius:8px; display:block;">
            <div style="margin-top:8px; color:#888; font-size:0.8rem;">Scan to open the board</div>
            <div style="margin-top:12px;"><button class="ghost" onclick="closeQR()">Close</button></div>
        </div>
    </div>

    <script>
        const tokenKey = 'ownerToken';
        const getToken = () => localStorage.getItem(tokenKey) || '';
        const setToken = (t) => localStorage.setItem(tokenKey, t);
        const show = (id) => ['setup-view', 'login-view', 'dash-view'].forEach(v => {
            document.getElementById(v).style.display = (v === id) ? 'block' : 'none';
        });

        async function init() {
            const site = await (await fetch('/api/site')).json();
            if (!site.setup) { show('setup-view'); return; }
            if (getToken()) {
                const ok = (await fetch('/api/owner/session', { headers: { 'X-Owner-Token': getToken() } })).ok;
                if (ok) { show('dash-view'); loadBoards(); return; }
            }
            show('login-view');
        }

        async function doSetup() {
            const p = document.getElementById('setup-pass').value;
            const p2 = document.getElementById('setup-pass2').value;
            const err = document.getElementById('setup-err');
            err.innerText = '';
            if (p.length < 4) { err.innerText = 'Password must be at least 4 characters.'; return; }
            if (p !== p2) { err.innerText = "Passwords don't match."; return; }
            const res = await fetch('/api/site/setup', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: p }) });
            if (!res.ok) { err.innerText = (await res.json()).error || 'Setup failed.'; return; }
            setToken((await res.json()).token);
            show('dash-view'); loadBoards();
        }

        async function doLogin() {
            const p = document.getElementById('login-pass').value;
            const err = document.getElementById('login-err');
            err.innerText = '';
            const res = await fetch('/api/site/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: p }) });
            if (!res.ok) { err.innerText = (await res.json()).error || 'Login failed.'; return; }
            setToken((await res.json()).token);
            show('dash-view'); loadBoards();
        }

        async function doLogout() {
            await fetch('/api/site/logout', { method: 'POST', headers: { 'X-Owner-Token': getToken() } });
            localStorage.removeItem(tokenKey);
            document.getElementById('login-pass').value = '';
            show('login-view');
        }

        async function loadBoards() {
            const res = await fetch('/api/owner/pools', { headers: { 'X-Owner-Token': getToken() } });
            if (res.status === 401) { localStorage.removeItem(tokenKey); show('login-view'); return; }
            const data = await res.json();
            document.getElementById('count').innerText = data.pools.length;
            const origin = location.origin;
            const wrap = document.getElementById('boards');
            if (!data.pools.length) { wrap.innerHTML = '<p class="muted">No boards yet. Create one above.</p>'; return; }
            wrap.innerHTML = data.pools.map(p => {
                const share = origin + p.shareUrl;
                const admin = origin + p.adminUrl;
                const lockTag = p.locked ? ' • 🔒 locked' : '';
                return `<div class="board-card">
                    <div class="top">
                        <span class="name">${escapeHtml(p.name)}</span>
                        <span class="meta">${p.filled}/${p.total || 100} filled${lockTag}</span>
                    </div>
                    <div class="actions">
                        <button class="small" onclick="window.open('${share}','_blank')">Open board</button>
                        <button class="ghost small" onclick="copyText('${share}', this)">Copy board link</button>
                        <button class="ghost small" onclick="showQR('${share}', '${escapeJs(p.name)}')">QR</button>
                        <button class="small" onclick="window.open('${admin}','_blank')">Open admin</button>
                        <button class="ghost small" onclick="copyText('${admin}', this)">Copy admin link</button>
                        <button class="red small" onclick="deleteBoard('${p.id}', '${escapeJs(p.name)}')">Delete</button>
                    </div>
                </div>`;
            }).join('');
        }

        // --- CREATE WIZARD ---
        let wiz = null;
        const GRID_OPTS = [
            { key: 'std100', title: '10 x 10 (100 squares)', desc: 'Classic board, one digit per row and column.' },
            { key: 'std50', title: '10 x 5 (50 squares)', desc: 'Ten columns, five rows. Each row covers two digits.' },
            { key: 'std25', title: '5 x 5 (25 squares)', desc: 'Smaller board. Each row and column covers two digits.' },
        ];
        const NUM_OPTS = [
            { key: 'once', title: 'Static numbers', desc: 'One set of numbers drawn at lock, kept all game.' },
            { key: 'per_quarter', title: 'Re-draw each quarter', desc: 'Fresh numbers for Q1, Q2, Q3 and the final.' },
            { key: 'per_half', title: 'Re-draw at halftime', desc: 'One set for the first half, another for the second.' },
        ];

        function fmtLocal(iso) {
            if (!iso) return '';
            const d = new Date(iso);
            if (isNaN(d)) return '';
            return d.toLocaleString([], { weekday: 'short', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
        }

        function openWizard() {
            wiz = {
                i: 0, name: '', source: null, game: null, gameLabel: '',
                teamTop: 'Top', teamLeft: 'Left',
                colorTop: '#002244', colorTop2: '#1c5fb0', colorLeft: '#7a0000', colorLeft2: '#e23b3b',
                numberMode: 'once', gridType: 'std100', cost: '5', venmo: '',
            };
            document.getElementById('wiz').style.display = 'flex';
            wizRender();
        }
        function closeWizard() { document.getElementById('wiz').style.display = 'none'; wiz = null; }

        function wizSteps() {
            const s = ['name', 'source'];
            if (wiz.source === 'auto') s.push('game');
            else if (wiz.source === 'manual') s.push('teams');
            s.push('numbers', 'grid', 'price');
            return s;
        }

        const WIZ = {
            name: {
                title: 'Name your board',
                render: () => `<label>Board name</label><input type="text" id="wz-name" value="${escapeHtml(wiz.name)}" placeholder="Super Bowl Squares" onkeyup="if(event.key==='Enter') wizNext()">`,
                save: () => { wiz.name = document.getElementById('wz-name').value.trim(); if (!wiz.name) return 'Give the board a name.'; },
            },
            source: {
                title: 'How are the teams set?',
                render: () => `
                    <div class="wiz-choice ${wiz.source==='auto'?'sel':''}" onclick="wizPickSource('auto')"><div class="ct">Pick a real game</div><div class="cd">Search ESPN and auto-fill team names, colors, kickoff time and live scores.</div></div>
                    <div class="wiz-choice ${wiz.source==='manual'?'sel':''}" onclick="wizPickSource('manual')"><div class="ct">Set it up manually</div><div class="cd">Type the two team names and pick their colors yourself.</div></div>`,
                save: () => { if (!wiz.source) return 'Pick one to continue.'; },
            },
            game: {
                title: 'Pick the game',
                render: () => `
                    <select id="wz-league">
                        <option value="nfl">NFL</option><option value="ncaaf">College Football</option>
                        <option value="nba">NBA</option><option value="wnba">WNBA</option><option value="ncaab">College Basketball</option>
                    </select>
                    <div style="display:flex; gap:8px; margin-top:8px; align-items:center;"><input type="text" id="wz-team" placeholder="Team name (optional)" style="flex:1 1 auto; min-width:0; width:auto;"><input type="date" id="wz-date" style="flex:0 0 auto; width:auto;"></div>
                    <div style="text-align:right; margin-top:8px;"><button class="ghost small" onclick="wizFindGames()">Find games</button></div>
                    <div class="wiz-glist" id="wz-glist"></div>
                    <div class="wiz-hint" id="wz-gsel">${wiz.game ? 'Selected: ' + escapeHtml(wiz.gameLabel) : 'No game selected yet.'}</div>`,
                onShow: () => { if (wiz.game) document.getElementById('wz-league').value = wiz.game.league; },
                save: () => { if (!wiz.game) return 'Find and choose a game, or go Back to set teams manually.'; },
            },
            teams: {
                title: 'Teams and colors',
                render: () => `
                    <label>Auto-find colors from</label>
                    <select id="wz-clg">
                        <option value="nfl">NFL</option><option value="ncaaf">College Football</option>
                        <option value="nba">NBA</option><option value="wnba">WNBA</option><option value="ncaab">College Basketball</option>
                    </select>
                    <label>Top team (columns)</label>
                    <div style="display:flex; gap:8px; align-items:center;"><input type="text" id="wz-tt" value="${escapeHtml(wiz.teamTop)}" style="flex:1 1 auto; min-width:0; width:auto;"><button class="ghost small" type="button" onclick="wizFindColors('top')">Find colors</button></div>
                    <div class="wiz-color-pair">${colorPair('ct', wiz.colorTop)}${colorPair('ct2', wiz.colorTop2)}</div>
                    <label>Left team (rows)</label>
                    <div style="display:flex; gap:8px; align-items:center;"><input type="text" id="wz-tl" value="${escapeHtml(wiz.teamLeft)}" style="flex:1 1 auto; min-width:0; width:auto;"><button class="ghost small" type="button" onclick="wizFindColors('left')">Find colors</button></div>
                    <div class="wiz-color-pair">${colorPair('cl', wiz.colorLeft)}${colorPair('cl2', wiz.colorLeft2)}</div>
                    <div class="wiz-hint" id="wz-color-note">Pick colors, paste hex codes, or auto-find a real team's colors. Two each make a gradient.</div>`,
                save: () => {
                    wiz.teamTop = document.getElementById('wz-tt').value.trim() || 'Top';
                    wiz.teamLeft = document.getElementById('wz-tl').value.trim() || 'Left';
                    wiz.colorTop = document.getElementById('wz-ct').value; wiz.colorTop2 = document.getElementById('wz-ct2').value;
                    wiz.colorLeft = document.getElementById('wz-cl').value; wiz.colorLeft2 = document.getElementById('wz-cl2').value;
                },
            },
            numbers: {
                title: 'Numbers',
                render: () => NUM_OPTS.map(o => `<div class="wiz-choice ${wiz.numberMode===o.key?'sel':''}" onclick="wizPick('numberMode','${o.key}')"><div class="ct">${o.title}</div><div class="cd">${o.desc}</div></div>`).join(''),
                save: () => {},
            },
            grid: {
                title: 'Board size',
                render: () => GRID_OPTS.map(o => `<div class="wiz-choice ${wiz.gridType===o.key?'sel':''}" onclick="wizPick('gridType','${o.key}')"><div class="ct">${o.title}</div><div class="cd">${o.desc}</div></div>`).join(''),
                save: () => {},
            },
            price: {
                title: 'Price',
                render: () => `
                    <label>Cost per square ($)</label><input type="number" id="wz-cost" min="0" value="${escapeHtml(wiz.cost)}">
                    <label>Venmo link (optional)</label><input type="text" id="wz-venmo" value="${escapeHtml(wiz.venmo)}" placeholder="https://venmo.com/u/...">`,
                save: () => { wiz.cost = (document.getElementById('wz-cost').value || '0').trim(); wiz.venmo = document.getElementById('wz-venmo').value.trim(); },
            },
        };

        function wizPickSource(s) { wiz.source = s; wizRender(); }
        function wizPick(field, val) { wiz[field] = val; wizRender(); }

        function colorPair(id, val) {
            return `<span class="wiz-cpair"><input type="color" class="color-picker" id="wz-${id}" value="${val}" oninput="wizHexFromPicker('${id}')"><input type="text" class="wiz-hex" id="wz-${id}-hex" value="${val}" maxlength="7" placeholder="#000000" style="width:84px; flex:0 0 auto;" oninput="wizPickerFromHex('${id}')"></span>`;
        }
        function wizHexFromPicker(id) { document.getElementById('wz-' + id + '-hex').value = document.getElementById('wz-' + id).value.toUpperCase(); }
        function wizPickerFromHex(id) {
            const v = document.getElementById('wz-' + id + '-hex').value.trim();
            if (/^#[0-9a-fA-F]{6}$/.test(v)) document.getElementById('wz-' + id).value = v;
        }
        function setWizColor(id, hex) {
            if (!hex) return;
            document.getElementById('wz-' + id).value = hex;
            document.getElementById('wz-' + id + '-hex').value = hex.toUpperCase();
        }
        async function wizFindColors(which) {
            const nameEl = document.getElementById(which === 'top' ? 'wz-tt' : 'wz-tl');
            const ids = which === 'top' ? ['ct', 'ct2'] : ['cl', 'cl2'];
            const team = nameEl.value.trim();
            const note = document.getElementById('wz-color-note');
            if (!team) { note.innerText = 'Type a team name first.'; return; }
            note.innerText = 'Looking up colors...';
            try {
                const league = document.getElementById('wz-clg').value;
                const r = await fetch(`/api/owner/team-colors?league=${league}&team=${encodeURIComponent(team)}`, { headers: { 'X-Owner-Token': getToken() } });
                const d = await r.json();
                if (!d.team) { note.innerText = `No team matching "${team}" in that league.`; return; }
                setWizColor(ids[0], d.team.color);
                setWizColor(ids[1], d.team.color2);
                note.innerText = `Found ${d.team.name}.`;
            } catch (e) { note.innerText = 'Could not look up colors.'; }
        }

        function wizRender() {
            const steps = wizSteps();
            if (wiz.i >= steps.length) wiz.i = steps.length - 1;
            const key = steps[wiz.i];
            const def = WIZ[key];
            document.getElementById('wiz-dots').innerHTML = steps.map((s, idx) => `<span class="wiz-dot ${idx===wiz.i?'on':''} ${idx<wiz.i?'done':''}"></span>`).join('');
            document.getElementById('wiz-title').innerText = def.title;
            const body = document.getElementById('wiz-body'); body.className = 'wiz-body';
            body.innerHTML = def.render();
            document.getElementById('wiz-err').innerText = '';
            document.getElementById('wiz-back').style.visibility = wiz.i === 0 ? 'hidden' : 'visible';
            const next = document.getElementById('wiz-next');
            next.innerText = (key === 'price') ? 'Create board ✓' : 'Next →';
            next.onclick = wizNext;
            if (def.onShow) def.onShow();
            const first = body.querySelector('input[type=text], input[type=number]');
            if (first) setTimeout(() => first.focus(), 30);
        }

        function wizBack() { if (wiz.i > 0) { wiz.i--; wizRender(); } }
        async function wizNext() {
            const steps = wizSteps();
            const key = steps[wiz.i];
            const def = WIZ[key];
            const err = def.save ? def.save() : null;
            if (err) { document.getElementById('wiz-err').innerText = err; return; }
            if (key === 'price') { await wizCreate(); return; }
            const newSteps = wizSteps();
            wiz.i = newSteps.indexOf(key) + 1;
            wizRender();
        }

        async function wizFindGames() {
            const league = document.getElementById('wz-league').value;
            const team = document.getElementById('wz-team').value.trim();
            const date = (document.getElementById('wz-date').value || '').replace(/-/g, '');
            const list = document.getElementById('wz-glist');
            list.innerHTML = '<div class="muted" style="padding:6px 0;">Loading...</div>';
            const params = new URLSearchParams({ league });
            if (team) params.set('team', team); else if (date) params.set('date', date);
            const res = await fetch(`/api/owner/espn?${params}`, { headers: { 'X-Owner-Token': getToken() } });
            if (!res.ok) { list.innerHTML = '<div class="muted">Could not load games.</div>'; return; }
            const d = await res.json();
            if (!d.games.length) { list.innerHTML = `<div class="muted">${escapeHtml(d.note || 'No games found.')}</div>`; return; }
            list.innerHTML = d.games.map(g => `<div class="wiz-grow">
                <button class="ghost small" onclick="wizUseGame('${league}','${g.espnId}','${escapeJs(g.label)}')">Use</button>
                <span style="font-size:0.82rem;">${escapeHtml(g.label)}</span>
                <span class="muted" style="font-size:0.72rem; margin-left:auto; text-align:right;">${escapeHtml(fmtLocal(g.date))}</span>
            </div>`).join('');
        }
        function wizUseGame(league, espnId, label) {
            wiz.game = { league, espnId };
            wiz.gameLabel = label;
            document.getElementById('wz-glist').innerHTML = '';
            document.getElementById('wz-gsel').innerHTML = `Selected: <strong style="color:#4ade80;">${escapeHtml(label)}</strong>`;
        }

        async function wizCreate() {
            const body = {
                name: wiz.name, cost: wiz.cost, venmoUrl: wiz.venmo,
                numberMode: wiz.numberMode, gridType: wiz.gridType,
            };
            if (wiz.source === 'auto' && wiz.game) body.game = wiz.game;
            if (wiz.source === 'manual') {
                body.teamTop = wiz.teamTop; body.teamLeft = wiz.teamLeft;
                body.colorTop = wiz.colorTop; body.colorTop2 = wiz.colorTop2;
                body.colorLeft = wiz.colorLeft; body.colorLeft2 = wiz.colorLeft2;
            }
            const next = document.getElementById('wiz-next');
            next.innerText = 'Creating...'; next.onclick = null;
            const res = await fetch('/api/owner/pools', { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Owner-Token': getToken() }, body: JSON.stringify(body) });
            if (!res.ok) { document.getElementById('wiz-err').innerText = 'Could not create the board.'; next.innerText = 'Create board ✓'; next.onclick = wizNext; return; }
            const d = await res.json();
            wizShowDone(d);
            loadBoards();
        }
        function wizShowDone(d) {
            const origin = location.origin;
            const share = origin + d.shareUrl, admin = origin + d.adminUrl;
            document.getElementById('wiz-dots').innerHTML = '';
            document.getElementById('wiz-title').innerText = 'Board created';
            document.getElementById('wiz-body').innerHTML = `
                <div style="color:#4ade80; margin-bottom:10px;">Your board is ready.</div>
                <label>Player link</label><div class="wiz-links">${escapeHtml(share)}</div>
                <div style="margin:6px 0 12px;"><button class="ghost small" onclick="copyText('${share}', this)">Copy player link</button></div>
                <label>Admin link (keep this private)</label><div class="wiz-links">${escapeHtml(admin)}</div>
                <div style="margin-top:6px;"><button class="ghost small" onclick="copyText('${admin}', this)">Copy admin link</button></div>`;
            document.getElementById('wiz-err').innerText = '';
            document.getElementById('wiz-back').style.visibility = 'hidden';
            const next = document.getElementById('wiz-next');
            next.innerText = 'Done';
            next.onclick = closeWizard;
        }

        async function deleteBoard(id, name) {
            if (!confirm(`Delete "${name}" and all its squares? This can't be undone.`)) return;
            await fetch(`/api/owner/pools/${id}`, { method: 'DELETE', headers: { 'X-Owner-Token': getToken() } });
            loadBoards();
        }

        function fallbackCopy(text) {
            try {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.top = '-9999px';
                document.body.appendChild(ta);
                ta.focus(); ta.select();
                const ok = document.execCommand('copy');
                document.body.removeChild(ta);
                return ok;
            } catch (e) { return false; }
        }
        function copyText(text, btn) {
            // navigator.clipboard only works in secure contexts; fall back for plain-http hosts.
            const done = (ok) => {
                const old = btn.innerText; btn.innerText = ok ? 'Copied ✓' : 'Press Ctrl+C';
                setTimeout(() => { btn.innerText = old; }, 1400);
            };
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => done(true)).catch(() => done(fallbackCopy(text)));
            } else {
                done(fallbackCopy(text));
            }
        }
        function showQR(url, name) {
            document.getElementById('qr-title').innerText = name;
            document.getElementById('qr-img').src = 'https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=' + encodeURIComponent(location.origin + url);
            document.getElementById('qr-modal').style.display = 'flex';
        }
        function closeQR() { document.getElementById('qr-modal').style.display = 'none'; }
        function escapeHtml(s) { return String(s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }
        function escapeJs(s) { return String(s).replace(/['\\]/g, '\\$&'); }

        init();
    </script>
</body>
</html>
